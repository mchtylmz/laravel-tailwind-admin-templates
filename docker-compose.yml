version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: admin-templates-app
    ports:
      - "8080:80"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8080
      - DB_CONNECTION=mysql
      - DB_HOST=database
      - DB_PORT=3306
      - DB_DATABASE=admin_templates
      - DB_USERNAME=admin
      - DB_PASSWORD=secret
      - MAIL_MAILER=smtp
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
      - MAIL_USERNAME=null
      - MAIL_PASSWORD=null
    volumes:
      - .:/var/www/html
    depends_on:
      database:
        condition: service_healthy
      mailpit:
        condition: service_started

  database:
    image: mysql:8.0
    container_name: admin-templates-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: admin_templates
      MYSQL_USER: admin
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

  mailpit:
    image: axllent/mailpit
    container_name: admin-templates-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  node:
    image: node:22-alpine
    container_name: admin-templates-node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: sh -c "npm install && npm run build && npm run dev"
    ports:
      - "5173:5173"

volumes:
  mysql_data:
